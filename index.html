<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <meta
      name="description"
      content="버튼을 누르면 가상의 세계 인구 한 명이 줄고 100만원을 받는 블랙코미디 게임."
    >
    <title>버튼</title>
    <style>
      @font-face {
        font-family: "Galmuri11";
        src: url("./assets/fonts/Galmuri11-Bold.woff2") format("woff2");
        font-style: normal;
        font-weight: 700;
        font-display: swap;
      }

      :root {
        color-scheme: dark;
        --background: #000000;
        --foreground: #f2f5ef;
        --muted: #777c76;
        --line: #454a45;
        --amber: #e4aa3d;
        --red: #ff4938;
        --red-bright: #ff6552;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        background: var(--background);
      }

      body {
        position: relative;
        isolation: isolate;
        min-width: 320px;
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        overflow-x: hidden;
        background: var(--background);
        color: var(--foreground);
        font-family: "Galmuri11", "Apple SD Gothic Neo", system-ui, sans-serif;
        font-synthesis: none;
        font-weight: 700;
        letter-spacing: 0.025em;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: 20;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 2px,
          rgba(255, 255, 255, 0.018) 3px,
          rgba(0, 0, 0, 0.16) 4px
        );
        content: "";
        pointer-events: none;
      }

      button {
        font: inherit;
      }

      .status-bar {
        position: fixed;
        inset: 0 0 auto;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: clamp(1rem, 3vw, 1.8rem);
        pointer-events: none;
      }

      .status {
        min-width: 0;
        font-variant-numeric: tabular-nums;
      }

      .status:last-child {
        text-align: right;
      }

      .status__label {
        display: block;
        margin-bottom: 0.35rem;
        color: var(--muted);
        font-size: clamp(0.68rem, 2vw, 0.78rem);
        letter-spacing: 0.04em;
      }

      .status__value {
        display: block;
        overflow: hidden;
        font-size: clamp(0.92rem, 3.2vw, 1.28rem);
        text-overflow: ellipsis;
        text-shadow: 0 0 0.45rem rgba(242, 245, 239, 0.2);
        white-space: nowrap;
      }

      .game {
        display: grid;
        width: min(100%, 64rem);
        min-height: 100vh;
        min-height: 100svh;
        margin: 0 auto;
        padding: clamp(6.8rem, 15vh, 8.5rem) clamp(0.9rem, 5vw, 3rem) 2rem;
        align-items: start;
      }

      .game__content {
        display: flex;
        width: 100%;
        min-width: 0;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .subtitle {
        display: grid;
        width: 100%;
        min-height: 7.2rem;
        margin: 0 0 clamp(1.2rem, 4vh, 2rem);
        align-content: center;
        color: var(--foreground);
        font-size: clamp(1.05rem, 4.5vw, 1.9rem);
        letter-spacing: 0.04em;
        line-height: 1.6;
        text-shadow: 0 0 0.55rem rgba(242, 245, 239, 0.2);
        text-wrap: balance;
      }

      .subtitle__line {
        display: block;
        min-height: 1.6em;
      }

      .subtitle__line.is-typing::after {
        content: "▮";
        display: inline-block;
        margin-left: 0.12em;
        color: var(--amber);
        animation: cursor-blink 560ms steps(1, end) infinite;
      }

      .button {
        position: relative;
        width: auto;
        min-width: 10rem;
        flex: 0 0 auto;
        padding: 1rem 1.4rem;
        border: 0;
        background: transparent;
        color: var(--red);
        cursor: pointer;
        font-size: clamp(1.35rem, 5vw, 2.15rem);
        letter-spacing: 0.11em;
        text-shadow: 0 0 0.65rem rgba(255, 73, 56, 0.32);
        touch-action: manipulation;
        transition:
          color 80ms steps(2, end),
          opacity 80ms steps(2, end),
          text-shadow 80ms steps(2, end);
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .button::before {
        margin-right: 0.42em;
        content: "[";
      }

      .button::after {
        margin-left: 0.3em;
        content: "]";
      }

      .button:hover {
        color: var(--red-bright);
        text-shadow: 0 0 0.9rem rgba(255, 101, 82, 0.5);
      }

      .button:active {
        color: var(--red-bright);
        opacity: 0.74;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.35;
      }

      .button:focus-visible {
        outline: 2px dotted currentColor;
        outline-offset: 0.45rem;
        color: var(--red-bright);
        text-decoration: underline;
        text-decoration-style: dotted;
        text-underline-offset: 0.45em;
      }

      .roulette-log {
        width: 100%;
        max-height: min(38vh, 24rem);
        max-height: min(38svh, 24rem);
        margin: clamp(2rem, 6vh, 3rem) 0 0;
        padding: 0;
        overflow-y: auto;
        border-top: 1px dashed var(--line);
        list-style: none;
        scrollbar-color: var(--line) transparent;
        scrollbar-width: thin;
        text-align: left;
      }

      .roulette-log:empty {
        display: none;
      }

      .log-entry {
        position: relative;
        padding: 0.9rem 0.15rem 1rem;
        overflow: hidden;
        border-bottom: 1px dashed var(--line);
        animation: log-enter 120ms steps(3, end);
      }

      .log-entry__head {
        display: flex;
        min-width: 0;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 0.75rem;
        color: var(--muted);
        font-size: clamp(0.65rem, 2vw, 0.76rem);
        letter-spacing: 0.05em;
      }

      .log-entry__state {
        color: var(--amber);
        text-shadow: 0 0 0.45rem rgba(228, 170, 61, 0.24);
      }

      .log-entry__grid {
        display: grid;
        min-width: 0;
        column-gap: clamp(0.7rem, 2vw, 1.6rem);
        grid-template-columns: 1.35fr 0.75fr 0.75fr 1.35fr;
      }

      .log-field {
        min-width: 0;
        padding: 0;
      }

      .log-field__label {
        display: block;
        margin-bottom: 0.35rem;
        color: var(--muted);
        font-size: clamp(0.6rem, 1.8vw, 0.7rem);
        letter-spacing: 0.04em;
      }

      .log-field__value {
        display: block;
        min-height: 1.5em;
        overflow: hidden;
        color: var(--foreground);
        font-size: clamp(0.78rem, 2.4vw, 0.98rem);
        line-height: 1.5;
        overflow-wrap: anywhere;
        text-shadow: 0 0 0.4rem rgba(242, 245, 239, 0.16);
      }

      .log-entry:not(.is-complete) .log-field__value {
        color: var(--amber);
        text-shadow: 0 0 0.5rem rgba(228, 170, 61, 0.25);
      }

      .log-entry__result {
        min-height: 1.35em;
        margin: 0.75rem 0 0;
        color: var(--red-bright);
        font-size: clamp(0.72rem, 2.1vw, 0.86rem);
        text-align: right;
      }

      .log-entry.is-complete .log-entry__state {
        color: var(--red);
        text-shadow: 0 0 0.45rem rgba(255, 73, 56, 0.28);
      }

      .log-entry.is-impact {
        animation: log-impact 160ms steps(4, end);
      }

      .warning {
        min-height: 1.4em;
        margin: 0.65rem 0 0;
        color: var(--amber);
        font-size: 0.72rem;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .noscript {
        position: fixed;
        inset: 50% auto auto 50%;
        transform: translate(-50%, -50%);
      }

      @keyframes cursor-blink {
        0%, 48% { opacity: 1; }
        49%, 100% { opacity: 0; }
      }

      @keyframes log-enter {
        from {
          opacity: 0;
          transform: translateY(-0.35rem);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes log-impact {
        0% {
          opacity: 0.72;
          transform: translateX(0);
        }
        25% {
          transform: translateX(-2px);
        }
        75% {
          transform: translateX(2px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @media (max-width: 720px) {
        .status-bar {
          padding-inline: 0.85rem;
        }

        .status {
          max-width: 54%;
        }

        .game {
          padding-top: 6.3rem;
        }

        .subtitle {
          min-height: 6.3rem;
        }

        .roulette-log {
          max-height: 42vh;
          max-height: 42svh;
        }

        .log-entry__grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          row-gap: 0.8rem;
        }

        .log-field {
          padding: 0;
        }

        .log-field:nth-child(odd) {
          padding-right: 0.35rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }

      @media (forced-colors: active) {
        body::before {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="status-bar" aria-label="게임 상태">
      <div class="status">
        <span class="status__label">지구 사람</span>
        <strong id="population" class="status__value">8,199,768,010</strong>
      </div>
      <div class="status">
        <span class="status__label">내 돈</span>
        <strong id="money" class="status__value">₩0</strong>
      </div>
    </header>

    <main class="game">
      <div class="game__content">
        <h1
          class="subtitle"
          aria-label="버튼 누른다. 너 빼고 한 명 죽는다. 너는 100만원 받는다."
        >
          <span class="subtitle__line" data-subtitle-line aria-hidden="true"></span>
          <span class="subtitle__line" data-subtitle-line aria-hidden="true"></span>
          <span class="subtitle__line" data-subtitle-line aria-hidden="true"></span>
        </h1>

        <button id="press-button" class="button" aria-label="버튼" type="button">버튼</button>

        <ol id="roulette-log" class="roulette-log" aria-hidden="true"></ol>
        <p id="storage-warning" class="warning" role="status"></p>
        <div
          id="announcements"
          class="sr-only"
          role="log"
          aria-live="polite"
          aria-relevant="additions"
        ></div>
      </div>
    </main>

    <template id="roulette-entry-template">
      <li class="log-entry">
        <div class="log-entry__head">
          <span data-log-sequence>#000000</span>
          <span class="log-entry__state" data-log-state>추첨 중</span>
        </div>
        <div class="log-entry__grid">
          <div class="log-field">
            <span class="log-field__label">국가/지역</span>
            <strong class="log-field__value" data-log-location>—</strong>
          </div>
          <div class="log-field">
            <span class="log-field__label">나이</span>
            <strong class="log-field__value" data-log-age>—</strong>
          </div>
          <div class="log-field">
            <span class="log-field__label">성별</span>
            <strong class="log-field__value" data-log-sex>—</strong>
          </div>
          <div class="log-field">
            <span class="log-field__label">사인</span>
            <strong class="log-field__value" data-log-cause>—</strong>
          </div>
        </div>
        <p class="log-entry__result" data-log-result></p>
      </li>
    </template>

    <noscript><p class="noscript">자바스크립트 필요.</p></noscript>
    <script type="module" src="./game.js"></script>
  </body>
</html>
