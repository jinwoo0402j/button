<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <meta
      name="description"
      content="버튼을 누르면 가상의 세계 인구 한 명이 줄고 100만원을 받는 블랙코미디 게임."
    >
    <title>100만원 버튼</title>
    <style>
      @font-face {
        font-family: "Galmuri11";
        src: url("./assets/fonts/Galmuri11-Bold.woff2") format("woff2");
        font-style: normal;
        font-weight: 700;
        font-display: swap;
      }

      :root {
        color-scheme: dark;
        --background: #000000;
        --foreground: #f2f5ef;
        --muted: #777c76;
        --line: #454a45;
        --amber: #e4aa3d;
        --green: #54df79;
        --green-bright: #7eff9f;
        --red: #ff4938;
        --red-bright: #ff6552;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      html {
        min-width: 320px;
        background: var(--background);
      }

      body {
        position: relative;
        isolation: isolate;
        min-width: 320px;
        height: 100vh;
        height: 100svh;
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        overflow: hidden;
        background: var(--background);
        color: var(--foreground);
        font-family: "Galmuri11", "Apple SD Gothic Neo", system-ui, sans-serif;
        font-synthesis: none;
        font-weight: 700;
        letter-spacing: 0.025em;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: 20;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 2px,
          rgba(255, 255, 255, 0.018) 3px,
          rgba(0, 0, 0, 0.16) 4px
        );
        content: "";
        pointer-events: none;
      }

      body.has-crt-color::before {
        background:
          linear-gradient(
            90deg,
            rgba(28, 235, 206, 0.014),
            transparent 46%,
            rgba(255, 62, 126, 0.012)
          ),
          repeating-linear-gradient(
            to bottom,
            transparent 0,
            transparent 2px,
            rgba(84, 223, 121, 0.024) 3px,
            rgba(0, 0, 0, 0.16) 4px
          );
      }

      button {
        font: inherit;
      }

      .audio-controls {
        position: fixed;
        inset: auto auto max(0.75rem, env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-left));
        z-index: 12;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.15rem;
      }

      .sound-toggle {
        padding: 0.3rem 0.2rem;
        border: 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: clamp(0.58rem, 1.8vw, 0.7rem);
        letter-spacing: 0.05em;
        touch-action: manipulation;
      }

      .sound-toggle:hover,
      .sound-toggle:focus-visible,
      .sound-toggle[aria-pressed="true"]:hover {
        color: var(--green);
      }

      .sound-toggle:focus-visible {
        outline: 1px dotted currentColor;
        outline-offset: 0.2rem;
      }

      .dialogue-volume {
        display: grid;
        grid-template-columns: auto clamp(5rem, 12vw, 8rem) 2.7rem;
        align-items: center;
        gap: 0.35rem;
        padding: 0.25rem 0.2rem;
        color: var(--muted);
        font-size: clamp(0.58rem, 1.8vw, 0.7rem);
        letter-spacing: 0.05em;
      }

      .dialogue-volume__slider {
        width: 100%;
        accent-color: var(--green);
        cursor: pointer;
      }

      .dialogue-volume__slider:focus-visible {
        outline: 1px dotted var(--green);
        outline-offset: 0.2rem;
      }

      .dialogue-volume__value {
        min-width: 2.7rem;
        color: var(--foreground);
        font-variant-numeric: tabular-nums;
        text-align: right;
      }

      .viewport {
        display: grid;
        width: 100vw;
        height: 100vh;
        height: 100svh;
        overflow: hidden;
        background: var(--background);
        place-items: center;
      }

      .stage {
        --scene-circle-x: 25.625cqw;
        --scene-circle-y: 3.333333cqh;
        --scene-circle-width: 48.75cqw;
        --scene-circle-height: 86.666667cqh;
        --scene-speaker-y: 72.222222cqh;
        --scene-speaker-height: 5cqh;
        --scene-copy-y: 78.888889cqh;
        --scene-copy-height: 7.777778cqh;
        --scene-button-x: 37.5cqw;
        --scene-button-y: 90cqh;
        --scene-button-width: 25cqw;
        --scene-button-height: 7.777778cqh;
        position: relative;
        isolation: isolate;
        width: min(100vw, 177.777778svh);
        height: min(100svh, 56.25vw);
        overflow: hidden;
        background: var(--background);
        container-name: game-stage;
        container-type: size;
      }

      .status-bar {
        position: absolute;
        inset: 0 0 auto;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        gap: 1.25cqw;
        padding: 2.5cqh 2.5cqw;
        pointer-events: none;
      }

      .status {
        min-width: 0;
        font-variant-numeric: tabular-nums;
      }

      .status:last-child {
        text-align: right;
      }

      .status__label {
        display: block;
        margin-bottom: 0.5cqh;
        color: var(--muted);
        font-size: 0.9375cqw;
        letter-spacing: 0.04em;
      }

      .status__value {
        display: block;
        overflow: hidden;
        font-size: 1.40625cqw;
        text-overflow: ellipsis;
        text-shadow: 0 0 0.625cqw rgba(242, 245, 239, 0.2);
        white-space: nowrap;
      }

      .status__progress {
        display: block;
        min-height: 1.3em;
        margin-top: 0.416667cqh;
        color: var(--muted);
        font-size: 0.78125cqw;
        letter-spacing: 0.04em;
      }

      .status.is-complete .status__value {
        color: var(--green);
        text-shadow: 0 0 0.625cqw rgba(84, 223, 121, 0.28);
      }

      .game {
        position: absolute;
        inset: 0;
        display: flex;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      .game__content {
        position: relative;
        display: flex;
        width: 100%;
        height: 100%;
        min-height: 0;
        min-width: 0;
        padding: 15cqh 3.75cqw 9.722222cqh;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      body.is-scene-transitioning .game__content {
        pointer-events: none;
      }

      body.is-scene-exiting .game__content,
      body.is-scene-exiting .status-bar {
        animation: scene-dissolve-out 180ms steps(4, end) both;
        will-change: opacity, filter;
      }

      body.is-scene-entering .game__content,
      body.is-scene-entering .status-bar {
        animation: scene-dissolve-in 180ms steps(4, end) both;
        will-change: opacity, filter;
      }

      .focus-stage {
        position: static;
        display: grid;
        width: 100%;
        min-height: 26.111111cqh;
        place-items: center;
      }

      .focus-stage > * {
        grid-area: 1 / 1;
      }

      .setup-screen {
        position: absolute;
        inset: 0;
        display: grid;
        width: 100%;
        height: 100%;
        padding: 8cqh 7.5cqw;
        overflow-y: auto;
        align-content: center;
        justify-items: center;
        overscroll-behavior: contain;
        row-gap: 2.222222cqh;
        scroll-padding-block: 20cqh;
      }

      .setup-title {
        max-width: 52.5cqw;
        margin: 0;
        color: var(--foreground);
        font-size: 2.03125cqw;
        letter-spacing: 0.04em;
        line-height: 1.6;
        text-shadow: 0 0 0.6875cqw rgba(242, 245, 239, 0.2);
        text-wrap: balance;
      }

      .setup-step,
      .name-form {
        display: grid;
        justify-items: center;
        row-gap: 1.527778cqh;
      }

      .setup-detail,
      .name-hint,
      .name-error {
        margin: 0;
        color: var(--muted);
        font-size: 0.9375cqw;
        letter-spacing: 0.05em;
        line-height: 1.6;
      }

      .name-error {
        color: var(--red);
      }

      .profile-options {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1.875cqw;
      }

      .profile-option {
        display: grid;
        padding: 0.3125cqw;
        border: 0;
        background: transparent;
        color: var(--foreground);
        cursor: pointer;
        justify-items: center;
        row-gap: 0.972222cqh;
      }

      .profile-option:focus-visible {
        outline: 1px dotted currentColor;
        outline-offset: 0.25cqw;
      }

      .profile-art,
      .player-avatar {
        background-image: url("./assets/profile-options.png");
        background-position: left center;
        background-repeat: no-repeat;
        background-size: 200% 100%;
      }

      .profile-art {
        width: 12.5cqw;
        aspect-ratio: 1;
        filter: contrast(1.08);
        opacity: 0.72;
        transition: opacity 100ms steps(2, end), filter 100ms steps(2, end);
      }

      .profile-option[data-profile="female"] .profile-art,
      .player-avatar.is-female {
        background-position: right center;
      }

      .profile-option:hover .profile-art,
      .profile-option:focus-visible .profile-art {
        filter: contrast(1.16) brightness(1.08);
        opacity: 1;
      }

      .profile-option__label {
        font-size: 1cqw;
        letter-spacing: 0.06em;
      }

      .player-name-input {
        width: 22.5cqw;
        padding: 1.111111cqh 0.4375cqw;
        border: 0;
        border-bottom: 1px solid var(--line);
        outline: 0;
        background: transparent;
        color: var(--foreground);
        font: inherit;
        font-size: 1.40625cqw;
        letter-spacing: 0.06em;
        text-align: center;
      }

      .player-name-input:focus {
        border-bottom-color: var(--green);
        box-shadow: 0 0.486111cqh 0.8125cqw -0.75cqw rgba(84, 223, 121, 0.85);
      }

      .opening-screen {
        --opening-room-shift-x: 0cqw;
        --opening-room-shift-y: 0cqh;
        --opening-demon-shift-x: 0cqw;
        --opening-demon-shift-y: 0cqh;
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
      }

      .opening-visual {
        position: absolute;
        z-index: 0;
        top: var(--scene-circle-y);
        left: var(--scene-circle-x);
        display: none;
        isolation: isolate;
        width: var(--scene-circle-width);
        height: var(--scene-circle-height);
        border: 2px solid rgba(116, 122, 127, 0.72);
        border-radius: 50%;
        overflow: hidden;
        background: var(--background);
        box-shadow:
          inset 0 0 0 0.4375cqw rgba(198, 204, 209, 0.08),
          0 0.902778cqh 0 #181a1c,
          0 1.388889cqh 2.5cqw rgba(0, 0, 0, 0.72);
        pointer-events: none;
        scale: 1.5;
      }

      .opening-screen.is-dialogue:not([data-opening-visual="none"]) .opening-visual {
        display: block;
      }

      .opening-screen.is-dialogue:not([data-opening-visual="none"]) .opening-visual::after {
        position: absolute;
        inset: 0;
        z-index: 2;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0 34%,
          rgba(0, 0, 0, 0.42) 52%,
          rgba(0, 0, 0, 0.72) 100%
        );
        content: "";
      }

      .opening-visual__room,
      .opening-visual__demon,
      .opening-demon-frame {
        position: absolute;
        pointer-events: none;
        user-select: none;
      }

      .opening-visual__room {
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 58%;
        opacity: 0;
        transform: scale(1.06);
        translate: var(--opening-room-shift-x) var(--opening-room-shift-y);
        transition:
          opacity 260ms linear,
          transform 480ms steps(6, end),
          translate 160ms cubic-bezier(0.2, 0.8, 0.2, 1);
        will-change: transform, translate;
      }

      .opening-visual__demon {
        z-index: 1;
        top: -3.472222cqh;
        right: -2.34375cqw;
        width: 44.84375cqw;
        height: 117.866667cqh;
        filter: grayscale(1);
        opacity: 0;
        scale: 0.8;
        translate: var(--opening-demon-shift-x) var(--opening-demon-shift-y);
        transform-origin: center;
        transition:
          opacity 260ms linear,
          translate 120ms cubic-bezier(0.2, 0.8, 0.2, 1);
        will-change: translate;
      }

      .opening-demon-frame {
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: right top;
        opacity: 0;
        will-change: opacity;
      }

      .opening-demon-frame--idle-0 {
        opacity: 1;
      }

      .opening-demon-frame--idle-1 {
        animation: opening-demon-idle-frame-1 5.6s steps(1, end) infinite;
      }

      .opening-demon-frame--idle-2 {
        animation: opening-demon-idle-frame-2 5.6s steps(1, end) infinite;
      }

      .opening-demon-frame--blink-half {
        z-index: 2;
        animation: opening-demon-blink-half 6.4s steps(1, end) infinite;
      }

      .opening-demon-frame--blink-closed {
        z-index: 3;
        animation: opening-demon-blink-closed 6.4s steps(1, end) infinite;
      }

      [data-opening-visual="demon"] .opening-visual__room {
        opacity: 0.16;
      }

      [data-opening-visual="demon"] .opening-visual__demon {
        opacity: 1;
      }

      [data-opening-visual="room-hint"] .opening-visual__room {
        opacity: 0.28;
      }

      [data-opening-visual="room-hint"] .opening-visual__demon {
        opacity: 1;
      }

      [data-opening-visual="room-reveal"] .opening-visual__room {
        opacity: 1;
        transform: scale(1.04);
      }

      [data-opening-visual="room-reveal"] .opening-visual__demon {
        opacity: 1;
      }

      .opening-message {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }

      .player-identity {
        position: absolute;
        z-index: 4;
        top: 3.333333cqh;
        left: 2.5cqw;
        display: flex;
        align-items: center;
        color: var(--muted);
        column-gap: 0.625cqw;
        font-size: 0.9375cqw;
        letter-spacing: 0.06em;
      }

      .player-avatar {
        width: 3.25cqw;
        aspect-ratio: 1;
        filter: contrast(1.08);
      }

      .opening-title {
        margin: 0;
        color: var(--foreground);
        font-size: 5cqw;
        letter-spacing: 0.1em;
        line-height: 1;
        text-indent: 0.1em;
        text-shadow: 0 0 1.25cqw rgba(242, 245, 239, 0.28);
        white-space: nowrap;
      }

      .opening-copy {
        margin: 0;
        color: var(--muted);
        font-size: 1.25cqw;
        letter-spacing: 0.08em;
        line-height: 1.7;
        text-wrap: balance;
      }

      .opening-screen.is-narrative .opening-title {
        max-width: 52.5cqw;
        font-size: 2.03125cqw;
        letter-spacing: 0.04em;
        line-height: 1.65;
        text-indent: 0;
      }

      .opening-screen.is-narrative .opening-copy {
        color: var(--foreground);
        font-size: 1.40625cqw;
        letter-spacing: 0.04em;
        white-space: pre;
      }

      .opening-screen.is-dialogue .opening-title {
        position: absolute;
        top: var(--scene-speaker-y);
        left: 0;
        display: grid;
        width: 100%;
        max-width: none;
        height: var(--scene-speaker-height);
        margin: 0;
        align-items: center;
        color: var(--amber);
        font-size: 1.5625cqw;
        letter-spacing: 0.12em;
        text-shadow: 0 0 0.5625cqw rgba(228, 170, 61, 0.24);
      }

      .opening-screen.is-dialogue .opening-copy {
        position: absolute;
        top: var(--scene-copy-y);
        left: 10cqw;
        display: grid;
        width: 80cqw;
        height: var(--scene-copy-height);
        margin: 0;
        overflow: hidden;
        align-content: start;
        font-size: 1.875cqw;
        line-height: 1.1;
        white-space: pre-line;
      }

      .opening-screen.is-dialogue .opening-message {
        outline: 0;
      }

      .opening-screen.is-dialogue .opening-title,
      .opening-screen.is-dialogue .opening-copy {
        cursor: pointer;
        pointer-events: auto;
        touch-action: manipulation;
        transition:
          filter 80ms steps(2, end),
          translate 80ms steps(2, end);
        user-select: none;
      }

      .opening-screen.is-dialogue .opening-message.is-pressed .opening-title,
      .opening-screen.is-dialogue .opening-message.is-pressed .opening-copy {
        filter: brightness(0.72);
        translate: 0 0.35cqh;
      }

      .opening-screen.is-dialogue .opening-message:focus-visible .opening-title,
      .opening-screen.is-dialogue .opening-message:focus-visible .opening-copy {
        text-shadow:
          0 0 0.5625cqw rgba(126, 255, 159, 0.28),
          0 0 1px var(--foreground);
      }

      .opening-screen.is-dialogue .opening-button {
        display: none;
      }

      .opening-button {
        min-width: 12.5cqw;
      }

      .opening-screen.is-title .opening-message {
        inset: 20cqh 0 auto;
        height: 10cqh;
      }

      .opening-screen.is-title .opening-button {
        position: absolute;
        z-index: 4;
        top: 43.055556cqh;
        left: 40cqw;
        isolation: isolate;
        width: 20cqw;
        min-width: 0;
        height: 37.5cqh;
        margin: 0;
        padding: 29.166667cqh 0 0.763889cqh;
        overflow: visible;
      }

      .opening-screen.is-title .opening-button::before {
        position: absolute;
        z-index: -1;
        top: 0;
        left: 50%;
        width: 18.75cqw;
        height: 26.388889cqh;
        background: linear-gradient(
          to bottom,
          rgba(205, 211, 216, 0.58),
          rgba(164, 171, 177, 0.28) 54%,
          rgba(112, 119, 125, 0.06)
        );
        clip-path: polygon(45% 0, 55% 0, 94% 100%, 6% 100%);
        content: "";
        filter: blur(2px);
        opacity: 0.68;
        pointer-events: none;
        transform: translateX(-50%);
        animation: title-spotlight-flicker 5.4s steps(1, end) infinite;
      }

      .opening-screen.is-title .opening-button::after {
        position: absolute;
        z-index: 1;
        bottom: 4.513889cqh;
        left: 50%;
        width: 10cqw;
        height: 6.111111cqh;
        border: 2px solid #747a7f;
        border-radius: 50%;
        background: radial-gradient(
          ellipse at 50% 28%,
          #dfb0b2 0 8%,
          #a94b52 28%,
          #66252c 68%,
          #2b1115 100%
        );
        box-shadow:
          0 0.763889cqh 0 #303337,
          0 1.055556cqh 0.15625cqw rgba(0, 0, 0, 0.86),
          0 0 1.6875cqw rgba(198, 204, 209, 0.34);
        content: "";
        pointer-events: none;
        transform: translateX(-50%);
        transition:
          filter 120ms linear,
          transform 80ms steps(2, end),
          box-shadow 80ms steps(2, end);
      }

      .opening-screen.is-title .opening-button:hover::after,
      .opening-screen.is-title .opening-button:focus-visible::after {
        filter: brightness(1.12);
      }

      .opening-screen.is-title .opening-button:focus-visible {
        outline: 0;
      }

      .opening-screen.is-title .opening-button:focus-visible::after {
        box-shadow:
          0 0.763889cqh 0 #303337,
          0 1.055556cqh 0.15625cqw rgba(0, 0, 0, 0.86),
          0 0 0 2px rgba(126, 255, 159, 0.72),
          0 0 1.9375cqw rgba(198, 204, 209, 0.42);
      }

      .opening-screen.is-title .opening-button:active::after {
        box-shadow:
          0 0.388889cqh 0 #303337,
          0 0.611111cqh 0.078125cqw rgba(0, 0, 0, 0.86),
          0 0 1.875cqw rgba(198, 204, 209, 0.42);
        transform: translateX(-50%) translateY(0.375cqh);
      }

      .subtitle {
        display: grid;
        width: 80cqw;
        min-height: 10cqh;
        margin: 0;
        align-content: center;
        color: var(--foreground);
        font-size: 2.03125cqw;
        letter-spacing: 0.04em;
        line-height: 1.6;
        text-shadow: 0 0 0.6875cqw rgba(242, 245, 239, 0.2);
        text-wrap: balance;
      }

      .celebration.is-dissolving,
      .log-entry.is-dissolving {
        animation: text-dissolve 620ms steps(8, end) forwards;
        pointer-events: none;
      }

      .ethics-prompt {
        position: absolute;
        inset: 0;
        display: grid;
        width: 100%;
        height: 100%;
        align-content: center;
        justify-items: center;
        row-gap: 1.25cqh;
      }

      .ethics-reward {
        margin: 0;
        color: var(--foreground);
        font-size: 1.25cqw;
        letter-spacing: 0.04em;
      }

      .ethics-actions {
        display: flex;
        margin-top: 0.625cqh;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.902778cqh 1.25cqw;
      }

      .ethics-button {
        min-width: 10cqw;
        padding: 0.763889cqh 0.875cqw;
        border: 0;
        background: transparent;
        color: var(--foreground);
        cursor: pointer;
        font-size: 1.09375cqw;
        letter-spacing: 0.05em;
      }

      .ethics-button:hover,
      .ethics-button:focus-visible {
        color: var(--green);
      }

      .ethics-button:focus-visible {
        outline: 1px dotted currentColor;
        outline-offset: 0.3125cqw;
      }

            id="setup-screen"
            class="setup-screen"
            aria-labelledby="setup-title"
            hidden
          >
            <h1 id="setup-title" class="setup-title">어떤 언어로 플레이하시겠습니까?</h1>

            <div id="setup-language" class="setup-step">
              <p class="setup-detail">현재는 한국어만 지원합니다.</p>
              <button id="language-korean" class="ethics-button" type="button">[ 한국어 ]</button>
            </div>

            <div id="setup-profile" class="setup-step" hidden>
              <div class="profile-options" aria-label="프로필 선택">
                <button
                  id="profile-male"
                  class="profile-option"
                  data-profile="male"
                  type="button"
                  aria-label="남성 프로필 선택"
                >
                  <span class="profile-art" aria-hidden="true"></span>
                  <span class="profile-option__label">[ 남성 ]</span>
                </button>
                <button
                  id="profile-female"
                  class="profile-option"
                  data-profile="female"
                  type="button"
                  aria-label="여성 프로필 선택"
                >
                  <span class="profile-art" aria-hidden="true"></span>
                  <span class="profile-option__label">[ 여성 ]</span>
                </button>
              </div>
            </div>

            <form id="setup-name-form" class="name-form" hidden novalidate>
              <label class="sr-only" for="player-name">당신의 이름은?</label>
              <input
                id="player-name"
                class="player-name-input"
                name="player-name"
                type="text"
                maxlength="12"
                autocomplete="off"
                spellcheck="false"
                aria-describedby="name-hint name-error"
              >
              <p id="name-hint" class="name-hint">1~12자 · 이 탭에서만 기억</p>
              <p id="name-error" class="name-error" role="alert" hidden>이름을 입력해 주세요.</p>
              <button id="name-confirm" class="ethics-button" type="submit">[ 확인 ]</button>
            </form>
          </section>

          <section
            id="opening-screen"
            class="opening-screen is-title"
            data-opening-visual="none"
            aria-labelledby="opening-title"
          >
            <div id="player-identity" class="player-identity" hidden>
              <span id="player-avatar" class="player-avatar" aria-hidden="true"></span>
              <strong id="opening-player-name"></strong>
            </div>
            <div class="opening-visual" aria-hidden="true">
              <img
                class="opening-visual__room"
                src="./assets/opening-room.webp"
                width="1600"
                height="900"
                alt=""
                loading="eager"
                decoding="async"
                fetchpriority="low"
                draggable="false"
              >
              <div class="opening-visual__demon">
                <img
                  class="opening-demon-frame opening-demon-frame--idle-0"
                  src="./assets/opening-demon-idle-0.webp"
                  width="720"
                  height="1060"
                  alt=""
                  loading="eager"
                  decoding="async"
                  fetchpriority="low"
                  draggable="false"
                >
                <img
                  class="opening-demon-frame opening-demon-frame--idle-1"
                  src="./assets/opening-demon-idle-1.webp"
                  width="720"
                  height="1060"
                  alt=""
                  loading="eager"
                  decoding="async"
                  draggable="false"
                >
                <img
                  class="opening-demon-frame opening-demon-frame--idle-2"
                  src="./assets/opening-demon-idle-2.webp"
                  width="720"
                  height="1060"
                  alt=""
                  loading="eager"
                  decoding="async"
                  draggable="false"
                >
                <img
                  class="opening-demon-frame opening-demon-frame--blink-half"
                  src="./assets/opening-demon-blink-half.webp"
                  width="720"
                  height="1060"
                  alt=""
                  loading="eager"
                  decoding="async"
                  draggable="false"
                >
                <img
                  class="opening-demon-frame opening-demon-frame--blink-closed"
                  src="./assets/opening-demon-blink-closed.webp"
                  width="720"
                  height="1060"
                  alt=""
                  loading="eager"
                  decoding="async"
                  draggable="false"
                >
              </div>
            </div>
            <div id="opening-message" class="opening-message">
              <h1 id="opening-title" class="opening-title">100만원 버튼</h1>
              <p id="opening-copy" class="opening-copy" hidden></p>
            </div>
            <p
              id="opening-announcement"
              class="sr-only"
              aria-live="polite"
              aria-atomic="true"
            ></p>
            <button
              id="opening-advance"
              class="ethics-button opening-button"
              type="button"
              aria-label="100만원 버튼을 누른다."
            >[ 누르기 ]</button>
          </section>

          <section
            id="ethics-prompt"
            class="ethics-prompt"
            aria-labelledby="ethics-question"
            hidden
          >
            <h1
              id="ethics-question"
              class="subtitle"
              aria-live="polite"
              tabindex="-1"
            >대상: 전 세계 사람 중 무작위 1명. 한 명 죽는다.</h1>
            <p id="ethics-reward" class="ethics-reward">너는 100만원 받는다.</p>
            <div id="ethics-actions" class="ethics-actions">
              <button id="ethics-accept" class="ethics-button" type="button">[ 받아들인다 ]</button>
              <button id="ethics-reject" class="ethics-button" type="button">[ 거부한다 ]</button>
            </div>
          </section>

          <section id="money-display" class="money-display" aria-label="내 돈" hidden>
            <span id="target-label" class="target-label" hidden></span>
            <span class="money-display__label" aria-hidden="true">내 돈</span>
            <strong id="money" class="money-display__value">₩0</strong>
            <div class="processing-control">
              <button
                id="processing-upgrade"
                class="processing-upgrade"
                type="button"
                disabled
              >[ 처리 최적화 · 500만원 ]</button>
              <span
                id="processing-status"
                class="processing-status"
                hidden
              >처리 효율 ×2</span>
            </div>
            <span id="trade-record" class="money-display__record" hidden></span>
          </section>

          <div
            id="celebration"
            class="celebration"
            aria-hidden="true"
            hidden
          >
            <p class="celebration__title">목표 달성</p>
            <strong id="celebration-goal" class="celebration__goal"></strong>
            <span id="celebration-reward" class="celebration__reward"></span>
          </div>
        </div>

        <ol id="roulette-log" class="roulette-log" aria-hidden="true"></ol>
        <p id="storage-warning" class="warning" role="status" hidden></p>
        <span id="button-wave" class="button-wave" aria-hidden="true" hidden></span>
        <button
          id="press-button"
          class="button"
          aria-keyshortcuts="Space"
          aria-label="버튼"
          aria-hidden="true"
          type="button"
          hidden
        >버튼</button>
        <div
          id="announcements"
          class="sr-only"
          role="log"
          aria-live="polite"
          aria-relevant="additions"
          hidden
        ></div>
      </div>
        </main>
      </div>
    </div>

    <template id="roulette-entry-template">
      <li class="log-entry">
        <div class="log-entry__grid">
          <div class="log-field">
            <span class="log-field__label">국가/지역</span>
            <strong class="log-field__value" data-log-location>—</strong>
          </div>
          <div class="log-field">
            <span class="log-field__label">이름</span>
            <strong class="log-field__value" data-log-name>—</strong>
          </div>
          <div class="log-field">
            <span class="log-field__label">나이</span>
            <strong class="log-field__value" data-log-age>—</strong>
          </div>
          <div class="log-field">
            <span class="log-field__label">성별</span>
            <strong class="log-field__value" data-log-sex>—</strong>
          </div>
          <div class="log-field">
            <span class="log-field__label">사인</span>
            <strong class="log-field__value" data-log-cause>—</strong>
          </div>
        </div>
        <p class="log-entry__result" data-log-result></p>
      </li>
    </template>

    <noscript><p class="noscript">자바스크립트 필요.</p></noscript>
    <script type="module" src="./game.js?v=20260714-opening19-visual2-scene3-line2-copy2-titlelight2-identity1-dialoguekey1-voice2-sfx6-bgm3-blipvolume1-parallax3-textadvance1-copyfont1"></script>
  </body>
</html>
