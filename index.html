<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#090909">
    <meta
      name="description"
      content="100만원을 받는 대신 가상의 세계 인구 한 명이 줄어드는 버튼 사고실험."
    >
    <title>버튼</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #090909;
        --foreground: #f5f2ec;
        --muted: #9d9b96;
        --line: #383735;
        --red: #dc252d;
        --red-dark: #9d1017;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        background: var(--background);
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        overflow-x: hidden;
        background: var(--background);
        color: var(--foreground);
        font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }

      button,
      a {
        font: inherit;
      }

      .impact-layer {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        background: rgba(220, 37, 45, 0);
      }

      body.impact .impact-layer {
        animation: red-pulse 160ms ease-out;
      }

      body.impact .game {
        animation: small-shake 160ms linear;
      }

      .status-bar {
        position: fixed;
        inset: 0 0 auto;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: clamp(1rem, 3vw, 2rem);
        pointer-events: none;
      }

      .status {
        min-width: 0;
        font-variant-numeric: tabular-nums;
      }

      .status:last-child {
        text-align: right;
      }

      .status__label {
        display: block;
        margin-bottom: 0.2rem;
        color: var(--muted);
        font-size: clamp(0.68rem, 2vw, 0.82rem);
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .status__value {
        display: block;
        overflow: hidden;
        font-size: clamp(0.92rem, 3.3vw, 1.35rem);
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status__hint {
        display: block;
        margin-top: 0.2rem;
        color: var(--muted);
        font-size: clamp(0.58rem, 1.8vw, 0.7rem);
        letter-spacing: 0.02em;
      }

      .game {
        display: grid;
        width: min(100%, 52rem);
        min-height: 100vh;
        min-height: 100svh;
        margin: 0 auto;
        padding: clamp(7.5rem, 17vh, 10rem) clamp(1rem, 5vw, 3rem) 8.5rem;
        place-items: center;
      }

      .game__content {
        display: flex;
        width: 100%;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .rule {
        margin: 0 0 clamp(1.5rem, 5vh, 2.8rem);
        font-size: clamp(1.2rem, 4.7vw, 2rem);
        font-weight: 800;
        letter-spacing: -0.025em;
        line-height: 1.55;
      }

      .rule span {
        display: block;
      }

      .button {
        position: relative;
        width: clamp(8rem, 30vw, 10.5rem);
        aspect-ratio: 1;
        border: 0.4rem solid #ff5157;
        border-radius: 50%;
        background: var(--red);
        box-shadow:
          0 0.75rem 0 var(--red-dark),
          0 1.2rem 2.4rem rgba(0, 0, 0, 0.5);
        color: #fff;
        cursor: pointer;
        font-size: clamp(1.1rem, 4vw, 1.45rem);
        font-weight: 900;
        letter-spacing: -0.02em;
        touch-action: manipulation;
        transform: translateY(-0.35rem);
        transition:
          filter 100ms ease,
          transform 100ms ease,
          box-shadow 100ms ease;
      }

      .button:hover:not(:disabled) {
        filter: brightness(1.1);
      }

      .button:active:not(:disabled) {
        box-shadow:
          0 0.3rem 0 var(--red-dark),
          0 0.7rem 1.4rem rgba(0, 0, 0, 0.45);
        transform: translateY(0.1rem);
      }

      .button:disabled {
        cursor: wait;
        filter: grayscale(0.35) brightness(0.8);
      }

      .button:focus-visible,
      a:focus-visible {
        outline: 0.2rem solid #fff;
        outline-offset: 0.35rem;
      }

      .slots {
        display: grid;
        width: 100%;
        margin-top: clamp(2.2rem, 7vh, 4rem);
        border-block: 1px solid var(--line);
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .slot {
        min-width: 0;
        padding: 1rem 0.6rem 1.15rem;
      }

      .slot + .slot {
        border-left: 1px solid var(--line);
      }

      .slot__label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .slot__value {
        display: block;
        min-height: 2.8em;
        overflow-wrap: anywhere;
        font-size: clamp(0.86rem, 2.5vw, 1.05rem);
        font-weight: 800;
        line-height: 1.4;
      }

      .reward {
        min-height: 1.7em;
        margin: 1.1rem 0 0;
        color: #ff5f65;
        font-size: clamp(1rem, 3vw, 1.25rem);
        font-weight: 900;
      }

      .warning {
        min-height: 1.4em;
        margin: 0.45rem 0 0;
        color: #f0c98e;
        font-size: 0.78rem;
      }

      .footnote {
        position: fixed;
        inset: auto 0 0;
        z-index: 2;
        padding: 1rem clamp(1rem, 4vw, 2rem) max(1rem, env(safe-area-inset-bottom));
        background: linear-gradient(transparent, var(--background) 28%);
        color: var(--muted);
        font-size: clamp(0.65rem, 2vw, 0.75rem);
        line-height: 1.6;
        text-align: center;
      }

      .footnote p {
        margin: 0;
      }

      .footnote a {
        color: #c8c6c0;
        text-underline-offset: 0.2em;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .noscript {
        position: fixed;
        inset: 50% auto auto 50%;
        transform: translate(-50%, -50%);
        font-weight: 700;
      }

      @keyframes red-pulse {
        0% {
          background: rgba(220, 37, 45, 0.24);
        }
        100% {
          background: rgba(220, 37, 45, 0);
        }
      }

      @keyframes small-shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-2px); }
        75% { transform: translateX(2px); }
      }

      @media (max-width: 520px) {
        .status-bar {
          padding-inline: 0.85rem;
        }

        .status {
          max-width: 52%;
        }

        .slots {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .slot:nth-child(3) {
          border-left: 0;
          border-top: 1px solid var(--line);
        }

        .slot:nth-child(4) {
          border-top: 1px solid var(--line);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="impact-layer" aria-hidden="true"></div>

    <header class="status-bar" aria-label="게임 상태">
      <div class="status">
        <span class="status__label">지구 사람</span>
        <strong id="population" class="status__value">8,199,768,010</strong>
        <span class="status__hint">매초 +2 · 버튼 -1</span>
      </div>
      <div class="status">
        <span class="status__label">내 돈</span>
        <strong id="money" class="status__value">₩0</strong>
        <span class="status__hint">이 브라우저</span>
      </div>
    </header>

    <main class="game">
      <div class="game__content">
        <h1 class="rule">
          <span>버튼 누른다.</span>
          <span>너 빼고 한 명 죽는다.</span>
          <span>너는 100만원 받는다.</span>
        </h1>

        <button id="press-button" class="button" type="button">누른다</button>

        <section class="slots" aria-hidden="true">
          <div class="slot">
            <span class="slot__label">국가/지역</span>
            <strong id="slot-location" class="slot__value">—</strong>
          </div>
          <div class="slot">
            <span class="slot__label">나이</span>
            <strong id="slot-age" class="slot__value">—</strong>
          </div>
          <div class="slot">
            <span class="slot__label">성별</span>
            <strong id="slot-sex" class="slot__value">—</strong>
          </div>
          <div class="slot">
            <span class="slot__label">사인</span>
            <strong id="slot-cause" class="slot__value">—</strong>
          </div>
        </section>

        <p id="reward" class="reward" aria-hidden="true"></p>
        <p id="storage-warning" class="warning" role="status"></p>
        <p id="announcement" class="sr-only" aria-live="polite" aria-atomic="true"></p>
      </div>
    </main>

    <footer class="footnote">
      <p>가상 추첨. 실제 사람 아님. 인구·확률은 추정.</p>
      <p>
        인구 가중치:
        <a href="https://www.un.org/development/desa/pd/content/world-population-prospects-2024-dataset">UN WPP 2024</a>
        · 사인 공개 집계:
        <a href="https://www.who.int/news-room/fact-sheets/detail/the-top-10-causes-of-death">WHO 2021</a>
      </p>
    </footer>

    <noscript><p class="noscript">자바스크립트 필요.</p></noscript>
    <script type="module" src="./game.js"></script>
  </body>
</html>
