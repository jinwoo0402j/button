<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <meta
      name="description"
      content="버튼을 누르면 가상의 세계 인구 한 명이 줄고 100만원을 받는 블랙코미디 게임."
    >
    <title>버튼</title>
    <style>
      @font-face {
        font-family: "Galmuri11";
        src: url("./assets/fonts/Galmuri11-Bold.woff2") format("woff2");
        font-style: normal;
        font-weight: 700;
        font-display: swap;
      }

      :root {
        color-scheme: dark;
        --background: #000000;
        --foreground: #f2f5ef;
        --muted: #777c76;
        --line: #454a45;
        --amber: #e4aa3d;
        --green: #54df79;
        --green-bright: #7eff9f;
        --red: #ff4938;
        --red-bright: #ff6552;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      html {
        min-width: 320px;
        background: var(--background);
      }

      body {
        position: relative;
        isolation: isolate;
        min-width: 320px;
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        overflow-x: hidden;
        background: var(--background);
        color: var(--foreground);
        font-family: "Galmuri11", "Apple SD Gothic Neo", system-ui, sans-serif;
        font-synthesis: none;
        font-weight: 700;
        letter-spacing: 0.025em;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: 20;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 2px,
          rgba(255, 255, 255, 0.018) 3px,
          rgba(0, 0, 0, 0.16) 4px
        );
        content: "";
        pointer-events: none;
      }

      body.has-crt-color::before {
        background:
          linear-gradient(
            90deg,
            rgba(28, 235, 206, 0.014),
            transparent 46%,
            rgba(255, 62, 126, 0.012)
          ),
          repeating-linear-gradient(
            to bottom,
            transparent 0,
            transparent 2px,
            rgba(84, 223, 121, 0.024) 3px,
            rgba(0, 0, 0, 0.16) 4px
          );
      }

      button {
        font: inherit;
      }

      .status-bar {
        position: fixed;
        inset: 0 0 auto;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: clamp(1rem, 3vw, 1.8rem);
        pointer-events: none;
      }

      .status {
        min-width: 0;
        font-variant-numeric: tabular-nums;
      }

      .status:last-child {
        text-align: right;
      }

      .status__label {
        display: block;
        margin-bottom: 0.35rem;
        color: var(--muted);
        font-size: clamp(0.68rem, 2vw, 0.78rem);
        letter-spacing: 0.04em;
      }

      .status__value {
        display: block;
        overflow: hidden;
        font-size: clamp(0.92rem, 3.2vw, 1.28rem);
        text-overflow: ellipsis;
        text-shadow: 0 0 0.45rem rgba(242, 245, 239, 0.2);
        white-space: nowrap;
      }

      .status__progress {
        display: block;
        min-height: 1.3em;
        margin-top: 0.3rem;
        color: var(--muted);
        font-size: clamp(0.58rem, 1.8vw, 0.68rem);
        letter-spacing: 0.04em;
      }

      .status.is-complete .status__value {
        color: var(--green);
        text-shadow: 0 0 0.5rem rgba(84, 223, 121, 0.28);
      }

      .game {
        display: flex;
        width: min(100%, 64rem);
        min-height: 100vh;
        min-height: 100svh;
        margin: 0 auto;
        padding: clamp(6.8rem, 15vh, 8.5rem) clamp(0.9rem, 5vw, 3rem) 7rem;
      }

      .game__content {
        display: flex;
        width: 100%;
        min-height: calc(100svh - 13.8rem);
        min-width: 0;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .focus-stage {
        display: grid;
        width: 100%;
        min-height: clamp(8.2rem, 24vh, 11.8rem);
        place-items: center;
      }

      .focus-stage > * {
        grid-area: 1 / 1;
      }

      .subtitle {
        display: grid;
        width: 100%;
        min-height: 7.2rem;
        margin: 0;
        align-content: center;
        color: var(--foreground);
        font-size: clamp(1.05rem, 4.5vw, 1.9rem);
        letter-spacing: 0.04em;
        line-height: 1.6;
        text-shadow: 0 0 0.55rem rgba(242, 245, 239, 0.2);
        text-wrap: balance;
      }

      .subtitle.is-dissolving,
      .ethics-prompt.is-dissolving,
      .celebration.is-dissolving,
      .log-entry.is-dissolving {
        animation: text-dissolve 620ms steps(8, end) forwards;
        pointer-events: none;
      }

      .ethics-prompt {
        display: grid;
        width: 100%;
        justify-items: center;
        row-gap: 0.7rem;
      }

      .ethics-reward {
        margin: 0;
        color: var(--foreground);
        font-size: clamp(0.88rem, 2.7vw, 1.05rem);
        letter-spacing: 0.04em;
      }

      .ethics-actions {
        display: flex;
        margin-top: 0.45rem;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.65rem 1rem;
      }

      .ethics-button {
        min-width: 8rem;
        padding: 0.55rem 0.7rem;
        border: 0;
        background: transparent;
        color: var(--foreground);
        cursor: pointer;
        font-size: clamp(0.76rem, 2.3vw, 0.9rem);
        letter-spacing: 0.05em;
      }

      .ethics-button:hover,
      .ethics-button:focus-visible {
        color: var(--green);
      }

      .ethics-button:focus-visible {
        outline: 1px dotted currentColor;
        outline-offset: 0.25rem;
      }

      .ethics-prompt.is-refused .subtitle {
        min-height: 3rem;
      }

      .money-display {
        display: grid;
        justify-items: center;
        row-gap: 0.5rem;
      }

      .money-display__label {
        color: var(--muted);
        font-size: clamp(0.72rem, 2vw, 0.86rem);
        letter-spacing: 0.08em;
      }

      .target-label {
        color: var(--muted);
        font-size: clamp(0.62rem, 1.8vw, 0.72rem);
        letter-spacing: 0.04em;
      }

      .money-display__value {
        display: inline-block;
        color: var(--foreground);
        font-size: clamp(2rem, 7vw, 3.35rem);
        letter-spacing: 0.045em;
        text-shadow: 0 0 0.7rem rgba(242, 245, 239, 0.22);
        will-change: transform, opacity;
      }

      .money-display.is-increased .money-display__value {
        color: var(--green);
        text-shadow: 0 0 0.8rem rgba(84, 223, 121, 0.42);
      }

      .money-display.is-rolling .money-display__value {
        animation: money-roll 190ms steps(5, end);
      }

      .money-display__record {
        color: var(--muted);
        font-size: clamp(0.62rem, 1.8vw, 0.72rem);
        letter-spacing: 0.08em;
      }

      .processing-control {
        display: grid;
        min-height: 1.55em;
        place-items: center;
      }

      .processing-control > * {
        grid-area: 1 / 1;
      }

      .processing-upgrade {
        padding: 0.2rem 0.3rem;
        border: 0;
        background: transparent;
        color: var(--green);
        cursor: pointer;
        font-size: clamp(0.66rem, 1.9vw, 0.78rem);
        letter-spacing: 0.05em;
        text-shadow: 0 0 0.45rem rgba(84, 223, 121, 0.28);
      }

      .processing-upgrade:hover:not(:disabled),
      .processing-upgrade:focus-visible {
        color: var(--green-bright);
      }

      .processing-upgrade:focus-visible {
        outline: 1px dotted currentColor;
        outline-offset: 0.25rem;
      }

      .processing-upgrade:disabled {
        color: var(--muted);
        cursor: not-allowed;
        opacity: 0.6;
        text-shadow: none;
      }

      .processing-status {
        color: var(--green);
        font-size: clamp(0.66rem, 1.9vw, 0.78rem);
        letter-spacing: 0.08em;
        text-shadow: 0 0 0.45rem rgba(84, 223, 121, 0.24);
      }

      body.has-crt-color .status__value,
      body.has-crt-color .money-display__value {
        text-shadow:
          -1px 0 rgba(44, 230, 255, 0.16),
          1px 0 rgba(255, 72, 132, 0.14),
          0 0 0.7rem rgba(242, 245, 239, 0.2);
      }

      body.has-crt-color .money-display.is-increased .money-display__value {
        text-shadow:
          -1px 0 rgba(44, 230, 255, 0.18),
          1px 0 rgba(255, 72, 132, 0.16),
          0 0 0.8rem rgba(84, 223, 121, 0.42);
      }

      .focus-stage.is-celebrating {
        align-content: center;
        grid-template-rows: auto auto;
        row-gap: 0.8rem;
      }

      .focus-stage.is-celebrating .subtitle {
        visibility: hidden;
      }

      .focus-stage.is-celebrating .money-display {
        grid-area: 1 / 1;
        visibility: visible;
      }

      .focus-stage.is-celebrating .celebration {
        grid-area: 2 / 1;
      }

      .celebration {
        display: grid;
        z-index: 2;
        justify-items: center;
        row-gap: 0.45rem;
        letter-spacing: 0.06em;
      }

      .celebration__title {
        margin: 0;
        color: var(--green);
        font-size: clamp(1rem, 3vw, 1.35rem);
        text-shadow: 0 0 0.6rem rgba(84, 223, 121, 0.36);
      }

      .celebration__goal {
        color: var(--foreground);
        font-size: clamp(1.45rem, 5vw, 2.3rem);
      }

      .celebration__reward {
        color: var(--amber);
        font-size: clamp(0.72rem, 2vw, 0.88rem);
      }

      .button {
        position: fixed;
        inset: auto auto max(1rem, env(safe-area-inset-bottom)) 50%;
        z-index: 10;
        width: auto;
        min-width: 10rem;
        flex: 0 0 auto;
        padding: 1rem 1.4rem;
        border: 0;
        background: transparent;
        color: var(--green);
        cursor: pointer;
        font-size: clamp(1.35rem, 5vw, 2.15rem);
        letter-spacing: 0.11em;
        text-shadow: 0 0 0.65rem rgba(84, 223, 121, 0.32);
        touch-action: manipulation;
        transform: translateX(-50%);
        transition:
          color 80ms steps(2, end),
          opacity 80ms steps(2, end),
          text-shadow 80ms steps(2, end);
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .button.is-pressed {
        animation: button-press 80ms steps(2, end);
      }

      .button:not([hidden])::before {
        margin-right: 0.42em;
        content: "[";
      }

      .button:not([hidden])::after {
        margin-left: 0.3em;
        content: "]";
      }

      .button:hover {
        color: var(--green-bright);
        text-shadow: 0 0 0.9rem rgba(126, 255, 159, 0.5);
      }

      .button:active {
        color: var(--green-bright);
        opacity: 0.74;
      }

      .button.is-key-active {
        color: var(--green-bright);
        opacity: 0.74;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.35;
      }

      .button:focus-visible {
        outline: 2px dotted currentColor;
        outline-offset: 0.45rem;
        color: var(--green-bright);
        text-decoration: underline;
        text-decoration-style: dotted;
        text-underline-offset: 0.45em;
      }

      .button-wave {
        position: fixed;
        inset: auto auto calc(max(1rem, env(safe-area-inset-bottom)) + 1.45rem) 50%;
        z-index: 9;
        width: 10rem;
        height: 1rem;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 2px,
          rgba(84, 223, 121, 0.46) 3px,
          transparent 4px
        );
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) scaleX(0.72);
        transform-origin: center;
      }

      .button-wave.is-active {
        animation: button-wave 260ms steps(6, end);
      }

      body.has-button-trail .button-wave.is-active {
        animation: button-wave-trail 420ms steps(8, end);
      }

      .roulette-log {
        flex: 0 1 auto;
        width: 100%;
        max-height: min(32vh, 19rem);
        max-height: min(32svh, 19rem);
        margin: clamp(0.8rem, 3vh, 1.5rem) 0 0;
        padding: 0;
        overflow-y: auto;
        border-top: 1px dashed var(--line);
        list-style: none;
        scrollbar-color: var(--line) transparent;
        scrollbar-width: thin;
        text-align: left;
      }

      .roulette-log:empty {
        display: none;
      }

      .log-entry {
        position: relative;
        padding: 0.9rem 0.15rem 1rem;
        overflow: hidden;
        border-bottom: 1px dashed var(--line);
        animation: log-enter 120ms steps(3, end);
      }

      .log-entry__grid {
        display: grid;
        min-width: 0;
        column-gap: clamp(0.7rem, 2vw, 1.6rem);
        grid-template-columns: 1.15fr 0.8fr 1.45fr 0.8fr 1.65fr;
      }

      .log-field {
        min-width: 0;
        padding: 0;
      }

      .log-field__label {
        display: block;
        margin-bottom: 0.35rem;
        color: var(--muted);
        font-size: clamp(0.6rem, 1.8vw, 0.7rem);
        letter-spacing: 0.04em;
      }

      .log-field__value {
        display: block;
        min-height: 1.5em;
        overflow: hidden;
        color: var(--foreground);
        font-size: clamp(0.78rem, 2.4vw, 0.98rem);
        line-height: 1.5;
        overflow-wrap: anywhere;
        text-shadow: 0 0 0.4rem rgba(242, 245, 239, 0.16);
      }

      .log-field__value[data-emoji]::before {
        display: inline-block;
        min-width: 2.75em;
        margin-right: 0.32em;
        content: "[" attr(data-emoji) "]";
        filter:
          saturate(0.68)
          contrast(1.15)
          brightness(1)
          drop-shadow(0 0 0.18rem currentColor);
        font-family:
          "Apple Color Emoji",
          "Segoe UI Emoji",
          "Noto Color Emoji",
          sans-serif;
        font-size: 1.08em;
        font-weight: 400;
        letter-spacing: 0;
        line-height: 1;
        white-space: nowrap;
        vertical-align: -0.06em;
      }

      .log-entry:not(.is-complete) .log-field__value {
        color: var(--amber);
        text-shadow: 0 0 0.5rem rgba(228, 170, 61, 0.25);
      }

      .log-entry__result {
        min-height: 1.35em;
        margin: 0.75rem 0 0;
        color: var(--red-bright);
        font-size: clamp(0.72rem, 2.1vw, 0.86rem);
        text-align: right;
      }

      .log-entry.is-impact {
        animation: log-impact 160ms steps(4, end);
      }

      .warning {
        min-height: 1.4em;
        margin: 0.65rem 0 0;
        color: var(--amber);
        font-size: 0.72rem;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .noscript {
        position: fixed;
        inset: 50% auto auto 50%;
        transform: translate(-50%, -50%);
      }

      @keyframes button-press {
        0%, 100% {
          transform: translateX(-50%) translateY(0) scale(1);
        }
        35%, 70% {
          transform: translateX(-50%) translateY(2px) scaleX(0.96) scaleY(0.82);
        }
      }

      @keyframes button-wave {
        0% {
          opacity: 0.56;
          transform: translateX(-50%) scaleX(0.72) scaleY(0.7);
        }
        58% {
          opacity: 0.28;
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) scaleX(1.55) scaleY(1.4);
        }
      }

      @keyframes button-wave-trail {
        0% {
          opacity: 0.68;
          filter: drop-shadow(0 0 0 rgba(84, 223, 121, 0));
          transform: translateX(-50%) scaleX(0.72) scaleY(0.7);
        }
        48% {
          opacity: 0.32;
          filter:
            drop-shadow(0 -5px 0 rgba(44, 230, 255, 0.16))
            drop-shadow(0 5px 0 rgba(255, 72, 132, 0.12));
        }
        100% {
          opacity: 0;
          filter:
            drop-shadow(0 -10px 0 rgba(44, 230, 255, 0))
            drop-shadow(0 10px 0 rgba(255, 72, 132, 0));
          transform: translateX(-50%) scaleX(1.9) scaleY(1.7);
        }
      }

      @keyframes money-roll {
        0% {
          opacity: 0.36;
          filter: blur(1px);
          transform: translateY(0.5em);
        }
        38% {
          opacity: 0.82;
          filter: blur(0);
          transform: translateY(-0.14em);
        }
        66% {
          transform: translateY(0.06em);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes log-enter {
        from {
          opacity: 0;
          transform: translateY(-0.35rem);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes log-impact {
        0% {
          opacity: 0.72;
          transform: translateX(0);
        }
        25% {
          transform: translateX(-2px);
        }
        75% {
          transform: translateX(2px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes text-dissolve {
        0% {
          opacity: 1;
          filter: blur(0);
          letter-spacing: inherit;
          transform: translateY(0);
        }
        45% {
          opacity: 0.62;
          filter: blur(0.4px);
        }
        72% {
          opacity: 0.3;
          letter-spacing: 0.11em;
        }
        100% {
          opacity: 0;
          filter: blur(2px);
          letter-spacing: 0.16em;
          transform: translateY(-0.3rem);
        }
      }

      @media (max-width: 720px) {
        .status-bar {
          padding-inline: 0.85rem;
        }

        .status {
          max-width: 54%;
        }

        .game {
          padding-top: 6.3rem;
          padding-bottom: 6.2rem;
        }

        .focus-stage {
          min-height: 6.3rem;
        }

        .roulette-log {
          max-height: 36vh;
          max-height: 36svh;
        }

        .log-entry__grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          row-gap: 0.8rem;
        }

        .log-field {
          padding: 0;
        }

        .log-field:nth-child(odd) {
          padding-right: 0.35rem;
        }

        .log-field:last-child {
          grid-column: 1 / -1;
          padding-right: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }

      @media (max-height: 700px) {
        .game {
          padding-top: 5.8rem;
        }

        .focus-stage {
          min-height: 5.8rem;
        }

        .roulette-log {
          max-height: 28vh;
          max-height: 28svh;
        }
      }

      @media (forced-colors: active) {
        body::before {
          display: none;
        }

        .log-field__value[data-emoji]::before {
          filter: none;
        }
      }
    </style>
  </head>
  <body>
    <header id="status-bar" class="status-bar" aria-label="게임 상태" hidden>
      <div class="status">
        <span class="status__label">지구 사람</span>
        <strong id="population" class="status__value">8,199,768,010</strong>
      </div>
      <div id="goal-status" class="status">
        <span id="goal-label" class="status__label">다음 목표</span>
        <strong id="goal-value" class="status__value">100만원</strong>
        <span id="goal-progress" class="status__progress" hidden></span>
      </div>
    </header>

    <main class="game">
      <div class="game__content">
        <div id="focus-stage" class="focus-stage">
          <section
            id="ethics-prompt"
            class="ethics-prompt"
            aria-labelledby="ethics-question"
          >
            <h1
              id="ethics-question"
              class="subtitle"
              aria-live="polite"
              tabindex="-1"
            >대상: 전 세계 사람 중 무작위 1명. 한 명 죽는다.</h1>
            <p id="ethics-reward" class="ethics-reward">너는 100만원 받는다.</p>
            <div id="ethics-actions" class="ethics-actions">
              <button id="ethics-accept" class="ethics-button" type="button">[ 받아들인다 ]</button>
              <button id="ethics-reject" class="ethics-button" type="button">[ 거부한다 ]</button>
            </div>
          </section>

          <section id="money-display" class="money-display" aria-label="내 돈" hidden>
            <span id="target-label" class="target-label" hidden></span>
            <span class="money-display__label" aria-hidden="true">내 돈</span>
            <strong id="money" class="money-display__value">₩0</strong>
            <div class="processing-control">
              <button
                id="processing-upgrade"
                class="processing-upgrade"
                type="button"
                disabled
              >[ 처리 최적화 · 500만원 ]</button>
              <span
                id="processing-status"
                class="processing-status"
                hidden
              >처리 효율 ×2</span>
            </div>
            <span id="trade-record" class="money-display__record" hidden></span>
          </section>

          <div
            id="celebration"
            class="celebration"
            aria-hidden="true"
            hidden
          >
            <p class="celebration__title">목표 달성</p>
            <strong id="celebration-goal" class="celebration__goal"></strong>
            <span id="celebration-reward" class="celebration__reward"></span>
          </div>
        </div>

        <ol id="roulette-log" class="roulette-log" aria-hidden="true"></ol>
        <p id="storage-warning" class="warning" role="status" hidden></p>
        <span id="button-wave" class="button-wave" aria-hidden="true" hidden></span>
        <button
          id="press-button"
          class="button"
          aria-keyshortcuts="Space"
          aria-label="버튼"
          aria-hidden="true"
          type="button"
          hidden
        >버튼</button>
        <div
          id="announcements"
          class="sr-only"
          role="log"
          aria-live="polite"
          aria-relevant="additions"
          hidden
        ></div>
      </div>
    </main>

    <template id="roulette-entry-template">
      <li class="log-entry">
        <div class="log-entry__grid">
          <div class="log-field">
            <span class="log-field__label">국가/지역</span>
            <strong class="log-field__value" data-log-location>—</strong>
          </div>
          <div class="log-field">
            <span class="log-field__label">이름</span>
            <strong class="log-field__value" data-log-name>—</strong>
          </div>
          <div class="log-field">
            <span class="log-field__label">나이</span>
            <strong class="log-field__value" data-log-age>—</strong>
          </div>
          <div class="log-field">
            <span class="log-field__label">성별</span>
            <strong class="log-field__value" data-log-sex>—</strong>
          </div>
          <div class="log-field">
            <span class="log-field__label">사인</span>
            <strong class="log-field__value" data-log-cause>—</strong>
          </div>
        </div>
        <p class="log-entry__result" data-log-result></p>
      </li>
    </template>

    <noscript><p class="noscript">자바스크립트 필요.</p></noscript>
    <script type="module" src="./game.js"></script>
  </body>
</html>
